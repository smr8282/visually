<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시각장애 체험 앱</title>

<style>
body { margin:0; background:#0a0a0f; color:#fff; font-family:sans-serif; }

/* 카메라 */
#camera {
  position:relative;
  height:70vh;
}

video, .ghost {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 복시용 */
.ghost {
  pointer-events:none;
  opacity:0;
}

/* UI */
#panel { background:#13131a; padding:12px; }

.tabs {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
}

button {
  padding:8px;
  border:none;
  background:#1a1a26;
  color:#aaa;
  border-radius:8px;
  font-size:11px;
}

.active { background:#7b6cff; color:#fff; }

.slider-wrap { margin-top:10px; }
input[type=range]{ width:100%; }

.info {
  margin-top:8px;
  font-size:13px;
  color:#ddd;
  line-height:1.5;
}

/* overlay */
.overlay {
  position:absolute;
  inset:0;
  display:none;
}

#field { background: radial-gradient(circle, transparent 40%, black 100%); }
#tunnel { background: radial-gradient(circle, transparent 20%, black 100%); }
#binocular { background: linear-gradient(to right, black 50%, transparent 50%); }
#glare { background: radial-gradient(circle, rgba(255,255,255,0.5), transparent); }

</style>
</head>

<body>

<div id="camera">
  <video id="video" autoplay playsinline muted></video>
  <video id="ghost" class="ghost" autoplay playsinline muted></video>

  <div id="field" class="overlay"></div>
  <div id="tunnel" class="overlay"></div>
  <div id="binocular" class="overlay"></div>
  <div id="glare" class="overlay"></div>
</div>

<div id="panel">

  <div class="tabs">
    <button data-mode="normal">정상</button>
    <button data-mode="acuity">시력</button>
    <button data-mode="field">시야</button>
    <button data-mode="tunnel">터널</button>
    <button data-mode="double">복시</button>
    <button data-mode="glare">광각</button>
    <button data-mode="color">색각</button>
    <button data-mode="refractive">굴절</button>
    <button data-mode="accommodation">조절</button>
    <button data-mode="binocular">양안</button>
  </div>

  <div class="slider-wrap">
    <label>강도: <span id="level">50</span></label>
    <input type="range" min="0" max="100" value="50" id="slider">
  </div>

  <div class="info" id="info"></div>

</div>

<script>
const video = document.getElementById('video');
const ghost = document.getElementById('ghost');
const slider = document.getElementById('slider');
const level = document.getElementById('level');
const info = document.getElementById('info');

let currentMode = 'normal';

const desc = {
  normal:"건강한 시각 상태입니다.",
  acuity:"시력장애: 전체적으로 흐릿하게 보입니다.",
  field:"시야장애: 주변 시야가 제한됩니다.",
  tunnel:"터널시야: 중심만 보입니다.",
  double:"복시: 하나의 물체가 두 개로 보입니다.\n- 한눈 복시: 한쪽 눈 문제\n- 두눈 복시: 눈 정렬 이상",
  glare:"광각장애: 빛 번짐 발생",
  color:"색각장애: 색 구분 어려움",
  refractive:"굴절장애: 초점 이상",
  accommodation:"조절장애: 근거리 흐림",
  binocular:"양안시야장애: 한쪽 시야 손실"
};

const overlays = {
  field: document.getElementById('field'),
  tunnel: document.getElementById('tunnel'),
  binocular: document.getElementById('binocular'),
  glare: document.getElementById('glare')
};

function reset(){
  video.style.filter='';
  ghost.style.opacity=0;
  ghost.style.transform='';

  Object.values(overlays).forEach(o=>o.style.display='none');
}

function apply(){
  const v = slider.value;
  level.innerText = v;

  reset();

  if(currentMode==='acuity'){
    video.style.filter = `blur(${v/15}px)`;
  }

  if(currentMode==='color'){
    video.style.filter = `grayscale(${v}%)`;
  }

  if(currentMode==='double'){
    // ⭐ 진짜 복시
    ghost.style.opacity = v/100;
    ghost.style.transform = `translate(${v/10}px, ${v/20}px)`;
  }

  if(currentMode==='field'){
    overlays.field.style.display='block';
    overlays.field.style.background =
      `radial-gradient(circle, transparent ${50 - v/2}%, black 100%)`;
  }

  if(currentMode==='tunnel'){
    overlays.tunnel.style.display='block';
    overlays.tunnel.style.background =
      `radial-gradient(circle, transparent ${30 - v/3}%, black 100%)`;
  }

  if(currentMode==='glare'){
    overlays.glare.style.display='block';
    overlays.glare.style.background =
      `radial-gradient(circle, rgba(255,255,255,${v/100}), transparent)`;
  }

  if(currentMode==='binocular'){
    overlays.binocular.style.display='block';
    overlays.binocular.style.background =
      `linear-gradient(to right, black ${v}%, transparent ${v}%)`;
  }

  info.innerText = desc[currentMode];
}

document.querySelectorAll('button').forEach(btn=>{
  btn.onclick=()=>{
    currentMode = btn.dataset.mode;
    document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    apply();
  }
});

slider.oninput = apply;

/* 카메라 */
async function start(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ ideal:"environment"} }
  });
  video.srcObject = stream;
  ghost.srcObject = stream; // ⭐ 복시용 동일 영상
}

start();
apply();
</script>

</body>
</html>
